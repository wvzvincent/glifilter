name: Update GL.iNet filter list

on:
  schedule:
    # 每天 UTC 18:00(北京时间次日 02:00)运行一次
    - cron: "0 18 * * *"
  workflow_dispatch:        # 允许在 Actions 页面手动触发
  push:
    branches: [ main ]
    paths:
      - "build_filter.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write           # 允许工作流提交回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build filter list
        run: python build_filter.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gl-inet-proxy-filter.txt gl-inet-proxy-domains.txt
          if git diff --staged --quiet; then
            echo "无变化,跳过提交。"
          else
            git commit -m "chore: auto-update filter list ($(date -u +%Y-%m-%d))"
            git push
          fi
